<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · Parent (Pizzaologists)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--paper); font-family: var(--font-body); color: var(--fg); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .swatch { display: flex; align-items: center; justify-content: center; border-radius: var(--radius-lg); padding: 16px; min-height: 210px; position: relative; }
  .swatch.paper { background: var(--paper); border: 1px solid var(--border); }
  .swatch.cream { background: var(--cream); }
  .swatch img { max-height: 178px; height: auto; display: block; }
  .label { position: absolute; top: 8px; left: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .caption { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); padding: 8px 4px 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch paper">
      <span class="label">parent brand · on paper</span>
      <img src="../assets/logo/pizzaologists-transparent.png" alt="Pizzaologists logo">
    </div>
    <div class="swatch cream">
      <span class="label">parent brand · on cream</span>
      <img src="../assets/logo/pizzaologists-transparent.png" alt="Pizzaologists logo">
    </div>
  </div>
  <div class="caption">Use Pizzaologists lockup for parent-brand mentions (e.g. "Operated by Pizzaologists. A First Stop Recovery program."). Do not co-brand Second Chance Slice + Pizzaologists side-by-side at the same scale.</div>
</body>
</html>
