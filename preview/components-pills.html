<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pills & tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--paper); font-family: var(--font-body); color: var(--fg); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; align-items: center; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 80px; flex: 0 0 80px; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">DEFAULT</div>
    <span class="pill">Culinary</span>
    <span class="pill">Construction</span>
    <span class="pill">Paid</span>
    <span class="pill">16 weeks</span>
  </div>
  <div class="row">
    <div class="label">TEAL</div>
    <span class="pill pill-teal">A First Stop Recovery program</span>
    <span class="pill pill-teal">Partner verified</span>
  </div>
  <div class="row">
    <div class="label">RED</div>
    <span class="pill pill-red">Apply by Mar 4</span>
    <span class="pill pill-red">2 seats left</span>
  </div>
  <div class="row">
    <div class="label">GOLD</div>
    <span class="pill pill-gold">New cohort</span>
    <span class="pill pill-gold">Now hiring</span>
  </div>
</body>
</html>
