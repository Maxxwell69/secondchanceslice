<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Photography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--paper); font-family: var(--font-body); color: var(--fg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .frame { aspect-ratio: 4/5; border-radius: var(--radius-md); overflow: hidden; position: relative; display:flex; align-items:flex-end; padding: 10px; color: #fff; font-size: 11px; font-weight: 600; }
  .frame::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.45) 100%); }
  .frame span { position: relative; z-index: 1; }
  .a { background: linear-gradient(135deg, #6E2616 0%, #D85A30 60%, #EF9F27 100%); }
  .b { background: linear-gradient(160deg, #2E0F06 0%, #6E2616 50%, #D85A30 100%); }
  .c { background: linear-gradient(150deg, #4A1B0C 0%, #B07A3E 100%); }
  .d { background: linear-gradient(140deg, #5C3315 0%, #EF9F27 70%, #FAEEDA 100%); }
  .note { grid-column: 1 / -1; margin-top: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="grid">
    <div class="frame a"><span>kitchen · oven light</span></div>
    <div class="frame b"><span>portrait · crew</span></div>
    <div class="frame c"><span>jobsite · framer hands</span></div>
    <div class="frame d"><span>shop · golden hour</span></div>
    <div class="note">PLACEHOLDER · warm-toned, golden, slightly grainy · no blue cast, no clinical stock</div>
  </div>
</body>
</html>
