<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Pull quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--cream); color: var(--fg); }
  .quote-block { max-width: 560px; }
  .mark { font-family: var(--font-serif); font-style: italic; font-size: 80px; line-height: 0.6; color: var(--pizza-red); display: block; margin-bottom: -10px; }
  blockquote { margin: 0 0 14px; }
  .attr { font-size: 13px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="quote-block">
    <span class="mark">&ldquo;</span>
    <blockquote>I came home with $40 and a bus pass. Eight weeks in, I had a paycheck and a ServSafe card. Now I run Friday-night line.</blockquote>
    <div class="attr">Marcus &middot; Cohort 9 graduate, line cook</div>
  </div>
</body>
</html>
