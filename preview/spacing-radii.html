<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 96px; height: 72px; background: var(--cream); border: 1.5px solid var(--espresso); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius: var(--radius-sm)"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-md)"></div><div class="name">md</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-lg)"></div><div class="name">lg</div><div class="val">20px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-xl)"></div><div class="name">xl</div><div class="val">28px</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-full); width: 72px; height: 72px;"></div><div class="name">full</div><div class="val">999px</div></div>
  </div>
</body>
</html>
