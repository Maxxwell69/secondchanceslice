<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing — 8pt scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); color: var(--fg); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 72px 56px 1fr; align-items: center; gap: 14px; margin-bottom: 8px; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .bar { height: 14px; background: var(--pizza-red); border-radius: 4px; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="val">4px</div><div class="bar" style="width: 4px"></div></div>
  <div class="row"><div class="name">space-2</div><div class="val">8px</div><div class="bar" style="width: 8px"></div></div>
  <div class="row"><div class="name">space-3</div><div class="val">12px</div><div class="bar" style="width: 12px"></div></div>
  <div class="row"><div class="name">space-4</div><div class="val">16px</div><div class="bar" style="width: 16px"></div></div>
  <div class="row"><div class="name">space-5</div><div class="val">24px</div><div class="bar" style="width: 24px"></div></div>
  <div class="row"><div class="name">space-6</div><div class="val">32px</div><div class="bar" style="width: 32px"></div></div>
  <div class="row"><div class="name">space-7</div><div class="val">48px</div><div class="bar" style="width: 48px"></div></div>
  <div class="row"><div class="name">space-8</div><div class="val">64px</div><div class="bar" style="width: 64px"></div></div>
  <div class="row"><div class="name">space-9</div><div class="val">96px</div><div class="bar" style="width: 96px"></div></div>
  <div class="row"><div class="name">space-10</div><div class="val">128px</div><div class="bar" style="width: 128px"></div></div>
</body>
</html>
