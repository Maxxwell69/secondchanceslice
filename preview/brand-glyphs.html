<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--paper); font-family: var(--font-body); color: var(--fg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px; border-radius: var(--radius-md); background: var(--cream); }
  .item svg { width: 44px; height: 44px; color: var(--pizza-red); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .role { font-size: 10px; color: var(--fg-muted); text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item">
      <object data="../assets/glyphs/slice.svg" type="image/svg+xml" width="44" height="44" style="color: var(--pizza-red);"></object>
      <div class="name">slice</div>
      <div class="role">brand · divider</div>
    </div>
    <div class="item">
      <object data="../assets/glyphs/apron.svg" type="image/svg+xml" width="44" height="44"></object>
      <div class="name">apron</div>
      <div class="role">culinary</div>
    </div>
    <div class="item">
      <object data="../assets/glyphs/hardhat.svg" type="image/svg+xml" width="44" height="44"></object>
      <div class="name">hardhat</div>
      <div class="role">construction</div>
    </div>
    <div class="item">
      <object data="../assets/glyphs/paycheck.svg" type="image/svg+xml" width="44" height="44"></object>
      <div class="name">paycheck</div>
      <div class="role">paid program</div>
    </div>
    <div class="item">
      <object data="../assets/glyphs/key.svg" type="image/svg+xml" width="44" height="44"></object>
      <div class="name">key</div>
      <div class="role">re-entry</div>
    </div>
  </div>
</body>
</html>
