<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 24px; background: var(--cream); color: var(--fg); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 110px; height: 70px; background: var(--paper); border-radius: var(--radius-lg); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm)"></div><div class="name">shadow-sm</div><div class="val">chips · inputs</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md)"></div><div class="name">shadow-md</div><div class="val">cards</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg)"></div><div class="name">shadow-lg</div><div class="val">modals</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xl)"></div><div class="name">shadow-xl</div><div class="val">focus / hero</div></div>
  </div>
</body>
</html>
