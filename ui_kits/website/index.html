<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Second Chance Slice — Marketing site (UI kit recreation)</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Stats.jsx"></script>
  <script type="text/babel" src="ProgramTracks.jsx"></script>
  <script type="text/babel" src="HowItWorks.jsx"></script>
  <script type="text/babel" src="Testimonial.jsx"></script>
  <script type="text/babel" src="HireBlock.jsx"></script>
  <script type="text/babel" src="DonateBlock.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="ApplyModal.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [applyOpen, setApplyOpen] = useState(false);
      const [toast, setToast] = useState(null);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2400);
      };

      const scrollToId = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      // Allow nested "Apply now" / "Hire a graduate" buttons to trigger global actions
      useEffect(() => {
        const handler = (e) => {
          const btn = e.target.closest("button, a");
          if (!btn) return;
          const text = btn.textContent.trim().toLowerCase();
          if (text === "apply now" || text === "save my seat") {
            if (btn.type !== "submit") { e.preventDefault(); setApplyOpen(true); }
          } else if (text.startsWith("hire a graduate")) {
            e.preventDefault();
            const el = document.getElementById("hire");
            if (el) el.scrollIntoView({ behavior: "smooth" });
          } else if (text.startsWith("sponsor a")) {
            e.preventDefault();
            showToast("Thanks — checkout is coming soon. We'll text you when it's live.");
          }
        };
        document.addEventListener("click", handler);
        return () => document.removeEventListener("click", handler);
      }, []);

      return (
        <>
          <Header
            onApply={() => setApplyOpen(true)}
            onHire={() => scrollToId("hire")}
            onOrder={() => showToast("Coming soon — order at the counter for now: 4501 Frankford Ave.")}
          />
          <main>
            <Hero onApply={() => setApplyOpen(true)} />
            <Stats />
            <ProgramTracks />
            <HowItWorks />
            <Testimonial />
            <HireBlock />
            <DonateBlock />
          </main>
          <Footer />
          <ApplyModal open={applyOpen} onClose={() => setApplyOpen(false)} />
          {toast && <div className="scs-toast">{toast}</div>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
